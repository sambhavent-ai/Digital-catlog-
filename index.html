<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>સંભવ એન્ટરપ્રાઈઝ કેટલોગ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; }
        .card { background: white; padding: 15px; margin: 10px auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { color: #f39c12; }
    </style>
</head>
<body>
    <div class="header">
        <h1>સંભવ એન્ટરપ્રાઈઝ</h1>
        <p>ડિજિટલ કેટલોગ</p>
    </div>
    <div class="card">
        <h2>🛠️ પાવર ટુલ્સ</h2>
        <p>ડ્રિલિંગ મશીન અને ઇન્ડસ્ટ્રિયલ ટુલ્સ.</p>
    </div>
    <div class="card">
        <h2>🔩 ફાસ્ટનર્સ</h2>
        <p>હાઈ-ક્વોલિટી નટ અને બોલ્ટ.</p>
    </div>
</body>
</html>
